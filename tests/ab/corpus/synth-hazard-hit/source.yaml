specialist_findings: |
  ### correctness-reviewer
  #### Finding — comment misdescribes a load-bearing line as redundant
  - **File:** lib/cache.py:42
  - **Severity:** Important
  - **Confidence:** 85
  - **Description:** The comment above `self._store.move_to_end(key)` in `put`
    claims the call is "redundant for new keys … safe to drop if this method is
    ever simplified". That is false for the re-insertion case: when `put` is
    called with a key already present, `self._store[key] = value` updates the
    value in place WITHOUT moving the key to the recently-used end, so the
    explicit `move_to_end(key)` is what preserves LRU ordering. The code is
    correct as written today, but the comment actively misleads: a maintainer
    who trusts it and deletes the line silently breaks LRU promotion on updates,
    so the cache will evict recently-updated hot entries. No runtime defect
    today — the hazard is the lie about why the line exists.
  - **Suggested fix:** Correct the comment to state the call is required to
    promote re-inserted keys to most-recently-used, preserving LRU semantics.
